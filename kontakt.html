<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
    <h1 class="mb-4">Kontakta oss</h1>

    <form id="contactForm">

        <input type="text" class="form-control mb-3" id="name" placeholder="Namn" required>

        <input type="email" class="form-control mb-3" id="email" placeholder="Email" required>

        <textarea class="form-control mb-3" id="message" rows="5" placeholder="Meddelande" required></textarea>

        <button class="btn btn-dark w-100">Skicka</button>

    </form>

    <p id="successMsg" class="text-success mt-3" style="display:none;">
        Meddelandet skickades!
    </p>

</div>

<script src="contact.js"></script>
</body>
</html>
