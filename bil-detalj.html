<!DOCTYPE html>
<html lang="sv">
<head>

            <img src="https://via.placeholder.com/300" alt="Volvo V70">
            <h2>Volvo V70</h2>

            <p>Mil: 12 000</p>
            <p>Pris: 85 000 kr</p>
            <button>Se mer</button>

        <div class="car-card">
            <img src="https://via.placeholder.com/300" alt="BMW 320">

            <p>År: 2018</p>
            <p>Mil: 8 500</p>

        </div>

        <div class="car-card">
            <img src="https://via.placeholder.com/300" alt="Audi A4">
